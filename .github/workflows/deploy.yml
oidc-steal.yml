name: oidc-claim-truncation-test
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
jobs:
  steal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            console.log('=== NEWLINE PATH OIDC TEST ===');
            console.log('GITHUB_WORKFLOW_REF:', process.env.GITHUB_WORKFLOW_REF);
            console.log('GITHUB_WORKFLOW:', process.env.GITHUB_WORKFLOW);
            try {
              const token = await core.getIDToken('sts.amazonaws.com');
              const parts = token.split('.');
              const payload = Buffer.from(parts[1], 'base64url').toString();
              const claims = JSON.parse(payload);
              console.log('=== OIDC CLAIMS ===');
              Object.entries(claims).sort().forEach(([k,v]) => console.log(`  ${k}: ${v}`));
              console.log('CRITICAL: job_workflow_ref =', claims.job_workflow_ref);
              console.log('CRITICAL: workflow_ref =', claims.workflow_ref);
            } catch(e) {
              console.log('OIDC request error:', e.message);
            }
