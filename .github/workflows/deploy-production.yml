name: deploy-production
on:
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Get OIDC token and show claims
        run: |
          echo "=== LEGITIMATE DEPLOY WORKFLOW ==="
          OIDC_URL="${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com"
          TOKEN=$(curl -sS -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "$OIDC_URL" | python3 -c "import json,sys;print(json.load(sys.stdin)['value'])")
          # Decode JWT claims (middle part)
          CLAIMS=$(echo "$TOKEN" | cut -d. -f2 | base64 -d 2>/dev/null || echo "$TOKEN" | cut -d. -f2 | python3 -c "import base64,sys;print(base64.urlsafe_b64decode(sys.stdin.read().strip()+'==').decode())")
          echo "OIDC Claims:"
          echo "$CLAIMS" | python3 -m json.tool 2>/dev/null || echo "$CLAIMS"
          echo ""
          echo "GITHUB_WORKFLOW_REF=$GITHUB_WORKFLOW_REF"
          echo "GITHUB_WORKFLOW=$GITHUB_WORKFLOW"
