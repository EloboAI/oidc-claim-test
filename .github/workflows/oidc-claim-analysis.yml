name: oidc-test
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
jobs:
  test-oidc:
    runs-on: ubuntu-latest
    steps:
      - name: Get OIDC token
        run: |
          echo "GITHUB_WORKFLOW_REF=$GITHUB_WORKFLOW_REF"
          echo "GITHUB_REPOSITORY=$GITHUB_REPOSITORY"
          echo "GITHUB_ACTOR=$GITHUB_ACTOR"
          echo ""
          if [ -z "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            echo "ERROR: No OIDC URL available"
            exit 1
          fi
          OIDC_URL="${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com"
          RESP=$(curl -sS -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "$OIDC_URL")
          echo "Raw response (first 100): ${RESP:0:100}"
          JWT=$(echo "$RESP" | python3 -c "import json,sys;print(json.load(sys.stdin).get('value','NO_VALUE'))")
          if [ "$JWT" = "NO_VALUE" ]; then
            echo "Failed to get JWT"
            echo "$RESP"
            exit 1
          fi
          echo ""
          echo "=== OIDC CLAIMS ==="
          echo "$JWT" | cut -d. -f2 | python3 << PYEOF
import base64, sys, json
data = sys.stdin.read().strip()
padding = 4 - len(data) % 4
if padding != 4:
    data += "=" * padding
decoded = base64.urlsafe_b64decode(data)
claims = json.loads(decoded)
for k,v in sorted(claims.items()):
    print(f"  {k}: {v}")
PYEOF
