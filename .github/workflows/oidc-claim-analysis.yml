name: oidc-simple
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
jobs:
  oidc:
    runs-on: ubuntu-latest
    steps:
      - name: Get OIDC
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('sts.amazonaws.com');
            const parts = token.split('.');
            const payload = Buffer.from(parts[1], 'base64url').toString();
            const claims = JSON.parse(payload);
            console.log('=== OIDC CLAIMS (audience=sts.amazonaws.com) ===');
            Object.entries(claims).sort().forEach(([k,v]) => console.log(`  ${k}: ${v}`));
            console.log('');
            console.log(`KEY: job_workflow_ref = ${claims.job_workflow_ref}`);
            console.log(`KEY: workflow_ref = ${claims.workflow_ref}`);
            console.log(`KEY: repository = ${claims.repository}`);
            console.log(`KEY: sub = ${claims.sub}`);
            console.log(`KEY: aud = ${claims.aud}`);

      - name: Multiple audiences
        uses: actions/github-script@v7
        with:
          script: |
            const audiences = ['api://AzureADTokenExchange', 'https://github.com/EloboAI', 'sigstore', 'https://github.com/github'];
            for (const aud of audiences) {
              console.log(`--- Audience: ${aud} ---`);
              try {
                const token = await core.getIDToken(aud);
                const payload = Buffer.from(token.split('.')[1], 'base64url').toString();
                const claims = JSON.parse(payload);
                console.log(`  aud: ${claims.aud}`);
                console.log(`  sub: ${claims.sub}`);
                console.log(`  job_workflow_ref: ${claims.job_workflow_ref}`);
                console.log(`  repository: ${claims.repository}`);
                console.log(`  iss: ${claims.iss}`);
              } catch(e) {
                console.log(`  ERROR: ${e.message}`);
              }
              console.log('');
            }
